<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF7BAC">
<title>🌸 宝贝成长相册</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script>
const CONFIG = {
  cloudName:    "YOUR_CLOUD_NAME",
  uploadPreset: "YOUR_UPLOAD_PRESET",
  indexFolder:  "baby_gallery",
};
</script>
<style>
:root{
  --rose:#FF7BAC;--rose2:#FF5A9E;--blush:#FFB5C8;
  --cream:#FFF8F0;--peach:#FFD4A8;
  --text:#3D2C35;--text2:#8B6B7A;--shadow:rgba(255,123,172,.15);
  /* class colors */
  --xb:#FFB5C8;--xb2:#FF8FAF;   /* 小班 pink */
  --zb:#B8D4FF;--zb2:#6B9FFF;   /* 中班 blue */
  --db:#B8F0D8;--db2:#3DC98A;   /* 大班 green */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Nunito','PingFang SC',sans-serif;background:var(--cream);color:var(--text)}
::-webkit-scrollbar{display:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden}

/* topbar */
.topbar{background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 4px 20px rgba(255,123,172,.35);z-index:10}
.topbar-title{font-size:1.22rem;letter-spacing:2px;font-weight:800}
.topbar-right{display:flex;gap:7px;align-items:center}
.pill{background:rgba(255,255,255,.22);padding:5px 11px;border-radius:20px;font-size:.74rem;font-weight:700;border:none;color:#fff;cursor:pointer;white-space:nowrap}
.pill:active{opacity:.8}

/* view toggle */
.view-toggle{background:#fff;border-bottom:1px solid #F0E0E8;display:flex;flex-shrink:0}
.vtab{flex:1;padding:10px;border:none;border-bottom:3px solid transparent;background:none;font-size:.86rem;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.vtab.active{color:var(--rose);border-bottom-color:var(--rose)}

/* class tabs */
.class-bar{background:#fff;border-bottom:1px solid #F0E0E8;display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.class-tab{flex:1;min-width:80px;padding:11px 8px;border:none;border-bottom:3px solid transparent;background:none;font-size:.86rem;font-weight:800;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;white-space:nowrap;text-align:center}
.class-tab.xb.active{color:var(--xb2);border-bottom-color:var(--xb2)}
.class-tab.zb.active{color:var(--zb2);border-bottom-color:var(--zb2)}
.class-tab.db.active{color:var(--db2);border-bottom-color:var(--db2)}

/* year tab-bar (fallback mode) */
.tab-bar{background:#fff;border-bottom:1px solid #F0E0E8;overflow-x:auto;display:flex;flex-shrink:0;scrollbar-width:none}
.tab-btn{padding:10px 18px;border:none;border-bottom:3px solid transparent;background:none;font-size:.88rem;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Nunito',sans-serif;transition:all .2s}
.tab-btn.active{color:var(--rose);border-bottom-color:var(--rose)}

/* content */
.content{flex:1;overflow-y:auto;padding:16px 14px 130px;
  background:radial-gradient(circle at 10% 20%,rgba(255,181,200,.1) 0%,transparent 50%),
             radial-gradient(circle at 90% 80%,rgba(184,228,255,.1) 0%,transparent 50%),var(--cream)}

/* group header */
.grp-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.grp-badge{color:#fff;font-weight:800;font-size:.82rem;padding:5px 14px;border-radius:50px;white-space:nowrap}
.grp-line{flex:1;height:1.5px}
.grp-count{font-size:.75rem;color:var(--text2);font-weight:700;background:#F5E8F0;padding:3px 10px;border-radius:20px}

/* photo grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 3px 16px var(--shadow);cursor:pointer;position:relative;transition:transform .12s}
.card:active{transform:scale(.96)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.card .info{padding:9px 12px}
.card .info .dt{font-size:.74rem;color:var(--text2);font-weight:700}
.card .info .cls-tag{display:inline-block;font-size:.68rem;border-radius:8px;padding:1px 7px;font-weight:800;margin-top:3px}
.card .info .note{font-size:.82rem;color:var(--text);margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .del{position:absolute;top:7px;right:7px;width:28px;height:28px;background:rgba(255,255,255,.92);border:none;border-radius:50%;cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* class header banner */
.class-banner{border-radius:16px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.class-banner .cb-icon{font-size:2rem}
.class-banner .cb-title{font-size:1.1rem;font-weight:800}
.class-banner .cb-range{font-size:.78rem;opacity:.8;margin-top:2px}
.class-banner .cb-count{margin-left:auto;font-size:.8rem;font-weight:700;background:rgba(255,255,255,.35);padding:4px 12px;border-radius:20px}

/* empty */
.empty{text-align:center;padding:70px 20px;color:var(--text2)}
.empty .ico{font-size:3.5rem;margin-bottom:14px}
.empty p{font-weight:700;font-size:1rem}
.empty small{font-size:.85rem;opacity:.7;display:block;margin-top:6px;line-height:1.7}
.btn-primary{display:inline-block;margin-top:16px;padding:12px 24px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border:none;border-radius:14px;font-weight:800;font-size:.95rem;cursor:pointer;box-shadow:0 4px 16px rgba(255,123,172,.4);font-family:'Nunito',sans-serif}

/* FAB */
.fab{position:fixed;bottom:24px;right:calc(50% - 240px + 20px);width:56px;height:56px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border:none;border-radius:50%;font-size:1.8rem;box-shadow:0 6px 20px rgba(255,123,172,.55);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;line-height:1;font-weight:300}
.fab:active{transform:scale(.9)}
@media(max-width:480px){.fab{right:20px}}

/* overlay + drawer */
.overlay{position:fixed;inset:0;background:rgba(61,44,53,.45);z-index:60;backdrop-filter:blur(3px)}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -8px 32px rgba(0,0,0,.12);z-index:70;padding:0 20px 32px;animation:slideUp .35s cubic-bezier(.32,.72,0,1)}
.drawer-handle{width:40px;height:4px;background:#E0D0D8;border-radius:2px;margin:12px auto 16px}
.drawer-title{font-size:1.15rem;font-weight:800;color:var(--rose);text-align:center;margin-bottom:16px}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.form-group{flex:1}
.form-group label{display:block;font-size:.72rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.form-group input[type=date],.form-group input[type=text]{width:100%;padding:11px 13px;border:2px solid #F0E0E8;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.92rem;color:var(--text);background:var(--cream);outline:none;-webkit-appearance:none}
.form-group input:focus{border-color:var(--rose);background:#fff}
.class-hint{border-radius:10px;padding:8px 12px;font-size:.8rem;font-weight:700;margin-bottom:12px;text-align:center}
.media-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.media-btn{padding:14px 10px;border:2px solid #F0E0E8;border-radius:14px;background:var(--cream);font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
.media-btn input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.media-btn .ico{font-size:1.4rem}
.preview-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
.preview-strip img{width:52px;height:52px;border-radius:10px;object-fit:cover;border:2px solid var(--blush);flex-shrink:0}
.btn-save{width:100%;padding:15px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(255,123,172,.4);letter-spacing:.5px}
.btn-save:disabled{background:var(--blush);cursor:not-allowed}

/* bulk page */
.page{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden}
.bulk-list{flex:1;overflow-y:auto;padding:16px 14px 120px}
.bulk-item{display:flex;gap:10px;background:#fff;border-radius:14px;padding:10px 12px;margin-bottom:10px;box-shadow:0 2px 10px rgba(255,123,172,.1);align-items:flex-start}
.bulk-item img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.bulk-item .meta{flex:1;min-width:0}
.bulk-item .fname{font-size:.72rem;color:var(--text2);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;margin-bottom:4px}
.bulk-item .fields{display:flex;gap:6px}
.bulk-item input[type=date]{flex:0 0 auto;width:130px;padding:6px 8px;border:1.5px solid #F0E0E8;border-radius:8px;font-family:'Nunito',sans-serif;font-size:.8rem;outline:none;background:var(--cream)}
.bulk-item input[type=date].missing{border-color:#FF9999;background:#FFF0F0}
.bulk-item input[type=text]{flex:1;padding:6px 8px;border:1.5px solid #F0E0E8;border-radius:8px;font-family:'Nunito',sans-serif;font-size:.8rem;outline:none;background:var(--cream);min-width:0}
.bulk-item .rm{background:none;border:none;cursor:pointer;color:#CCA0B0;font-size:1rem;flex-shrink:0;padding:2px}
.src-badge{display:inline-block;font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px}
.fill-bar{background:#FFF0F5;border:1.5px solid var(--blush);border-radius:14px;padding:12px 14px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fill-bar span{font-size:.82rem;font-weight:700;color:var(--rose2);flex:1 1 160px}
.fill-bar input{padding:7px 10px;border:1.5px solid var(--blush);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;background:#fff}
.fill-bar button{padding:7px 14px;background:var(--rose);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #F0E0E8;padding:12px 16px 28px;display:flex;gap:10px;align-items:center;z-index:30}
.bottom-bar .info{flex:1;font-size:.82rem;color:var(--text2);font-weight:700;line-height:1.4}
.bottom-bar .info b{color:var(--rose);font-weight:800}
.bottom-bar .info .warn{color:#FF9800}
.progress-wrap{text-align:center;padding:60px 20px}
.progress-bar-bg{background:#F0E0E8;border-radius:99px;height:10px;overflow:hidden;margin:0 20px 8px}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--rose),var(--rose2));transition:width .3s}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(15,8,12,.94);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:100%;max-height:72vh;border-radius:14px;object-fit:contain;animation:popIn .25s ease}
.lightbox .lb-info{margin-top:16px;text-align:center;color:#fff}
.lightbox .lb-date{font-weight:800;font-size:1rem;color:var(--blush)}
.lightbox .lb-cls{font-size:.85rem;margin-top:3px;font-weight:800}
.lightbox .lb-note{font-size:.88rem;opacity:.75;margin-top:4px}
.lightbox .lb-close{position:fixed;top:20px;right:20px;width:40px;height:40px;background:rgba(255,255,255,.15);border:none;border-radius:50%;font-size:1.1rem;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* toast */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;padding:11px 22px;border-radius:50px;font-weight:700;font-size:.9rem;z-index:300;box-shadow:0 6px 20px rgba(255,123,172,.4);transition:all .35s cubic-bezier(.34,1.56,.64,1);opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* setup */
.setup{display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:30px 24px 50px;background:var(--cream);overflow-y:auto}
.setup h2{font-size:1.5rem;color:var(--rose);margin-bottom:8px;text-align:center}
.setup .sub{color:var(--text2);font-size:.9rem;line-height:1.7;margin-bottom:20px;text-align:center}
.setup .field{width:100%;margin-bottom:12px;text-align:left}
.setup .field label{display:block;font-size:.78rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.setup .field input{width:100%;padding:13px 15px;border:2px solid #F0E0E8;border-radius:14px;font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);background:#fff;outline:none}
.setup .field input:focus{border-color:var(--rose)}
.setup .hint{font-size:.78rem;color:var(--text2);opacity:.75;margin-top:4px}
.sec-title{font-size:.78rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:1px;width:100%;text-align:left;margin:18px 0 10px;padding-top:16px;border-top:1px dashed #F0D0DC}
.class-setup-row{width:100%;background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 10px var(--shadow)}
.class-setup-row .cls-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.class-setup-row .cls-ico{font-size:1.2rem}
.class-setup-row .cls-name{font-weight:800;font-size:.95rem}
.class-setup-row .cls-dates{display:flex;gap:8px;align-items:center}
.class-setup-row .cls-dates input{flex:1;padding:8px 10px;border:1.5px solid #F0E0E8;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.82rem;outline:none;background:var(--cream)}
.class-setup-row .cls-dates input:focus{border-color:var(--rose)}
.class-setup-row .cls-dates span{font-size:.8rem;color:var(--text2);white-space:nowrap}

@keyframes slideUp{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ══════════════════════════════════════
// CLASSES CONFIG
// ══════════════════════════════════════
const CLASS_DEFS = [
  { key:"xb", name:"小班", icon:"🌱", color:"var(--xb2)", bg:"linear-gradient(135deg,var(--xb),var(--xb2))", light:"#FFF0F5", startKey:"xb_start", endKey:"xb_end" },
  { key:"zb", name:"中班", icon:"🌸", color:"var(--zb2)", bg:"linear-gradient(135deg,var(--zb),var(--zb2))", light:"#EEF5FF", startKey:"zb_start", endKey:"zb_end" },
  { key:"db", name:"大班", icon:"🌟", color:"var(--db2)", bg:"linear-gradient(135deg,var(--db),var(--db2))", light:"#EDFFF6", startKey:"db_start", endKey:"db_end" },
];

const DEFAULT_RANGES = {
  xb_start:"2023-09-01", xb_end:"2024-07-01",
  zb_start:"2024-09-01", zb_end:"2025-07-01",
  db_start:"2025-09-01", db_end:"2026-07-01",
};
function getClassRanges() {
  const s = JSON.parse(localStorage.getItem("class_ranges")||"{}");
  return CLASS_DEFS.map(c=>({
    ...c,
    start: s[c.startKey] || DEFAULT_RANGES[c.startKey] || "",
    end:   s[c.endKey]   || DEFAULT_RANGES[c.endKey]   || "",
  }));
}
function saveClassRanges(ranges) {
  const obj={};
  ranges.forEach(r=>{ obj[r.startKey]=r.start; obj[r.endKey]=r.end; });
  localStorage.setItem("class_ranges", JSON.stringify(obj));
}
function classRangesConfigured() {
  return getClassRanges().some(r=>r.start&&r.end);
}

// Given a date string, return which class it falls in (or null)
function getClassForDate(dateStr) {
  if(!dateStr) return null;
  const ranges = getClassRanges();
  for(const r of ranges) {
    if(r.start && r.end && dateStr >= r.start && dateStr <= r.end) return r;
  }
  return null;
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

function fmtFull(d){if(!d)return"未知日期";const[y,m,day]=d.split("-");return`${y}年${parseInt(m)}月${parseInt(day)}日`;}
function fmtShort(d){if(!d)return"?";const[,m,day]=d.split("-");return`${parseInt(m)}/${parseInt(day)}`;}

function extractDateFromFilename(filename){
  const name=filename.replace(/\.[^.]+$/,"");
  const m=name.match(/(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
  if(m){const[,y,mo,d]=m;const yi=parseInt(y),moi=parseInt(mo),di=parseInt(d);if(yi>=2018&&yi<=2035&&moi>=1&&moi<=12&&di>=1&&di<=31)return`${y}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`;}
  return null;
}
function extractExifDate(file){
  return new Promise(resolve=>{
    if(!file.type.match(/jpe?g/i))return resolve(null);
    const reader=new FileReader();
    reader.onload=e=>{
      try{const buf=new Uint8Array(e.target.result);for(let i=0;i<buf.length-100;i++){if(buf[i]===0xFF&&buf[i+1]===0xE1){const seg=buf.slice(i+2,Math.min(i+65536,buf.length));const str=String.fromCharCode(...seg.slice(0,Math.min(4000,seg.length)));const m=str.match(/(\d{4}):(\d{2}):(\d{2})/);if(m&&parseInt(m[1])>=2018)return resolve(`${m[1]}-${m[2]}-${m[3]}`);break;}}resolve(null);}catch{resolve(null);}
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file.slice(0,65536));
  });
}
async function smartDate(file){
  const exif=await extractExifDate(file);if(exif)return{date:exif,src:"exif"};
  const fn=extractDateFromFilename(file.name);if(fn)return{date:fn,src:"filename"};
  if(file.lastModified){const d=new Date(file.lastModified);if(d.getFullYear()>=2018){const mo=String(d.getMonth()+1).padStart(2,"0");const day=String(d.getDate()).padStart(2,"0");return{date:`${d.getFullYear()}-${mo}-${day}`,src:"modified"};}}
  return{date:null,src:"none"};
}
function toDataUrl(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);})}
function showToast(msg,dur=2800){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove("show"),dur);}

// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
function getConfig(){
  if(typeof CONFIG!=="undefined"&&CONFIG.cloudName!=="YOUR_CLOUD_NAME"&&CONFIG.uploadPreset!=="YOUR_UPLOAD_PRESET")return CONFIG;
  const saved=JSON.parse(localStorage.getItem("cl_config")||"{}");
  return{cloudName:saved.cloudName||"",uploadPreset:saved.uploadPreset||"",indexFolder:saved.indexFolder||"baby_gallery"};
}
function isConfigured(){const c=getConfig();return c.cloudName&&c.cloudName!=="YOUR_CLOUD_NAME"&&c.uploadPreset&&c.uploadPreset!=="YOUR_UPLOAD_PRESET";}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let state={
  view:"gallery",      // gallery | bulk | setup
  groupMode:"class",   // class | year
  photos:[],
  loading:true,
  activeClass:"xb",   // xb | zb | db (class mode)
  activeYear:null,     // year mode
  lightbox:null,
  drawerOpen:false,
  saving:false,
  formDate:new Date().toISOString().split("T")[0],
  formNote:"",
  previews:[],
  bulkItems:[],
  bulkScanning:false,
  bulkSaving:false,
  bulkProgress:0,
  fillDate:new Date().toISOString().split("T")[0],
  // setup form temps
  setupCloud:"",setupPreset:"",
  setupRanges: CLASS_DEFS.map(c=>({...c,start:DEFAULT_RANGES[c.startKey]||"",end:DEFAULT_RANGES[c.endKey]||""})),
};

function setState(patch){Object.assign(state,patch);render();}

// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
async function loadPhotos(){
  setState({loading:true});
  // Show cached photos immediately while fetching from Cloudinary
  try{
    const cached=JSON.parse(localStorage.getItem("gallery_photos")||"[]");
    if(cached.length){
      cached.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      setState({photos:cached,loading:false,activeClass:resolveActiveClass(cached)});
    }
  }catch{}
  // Fetch fresh list from Cloudinary
  try{
    const fresh=await fetchFromCloudinary();
    if(fresh.length){
      fresh.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      saveLocalIndex(fresh);
      setState({photos:fresh,loading:false,activeClass:resolveActiveClass(fresh)});
    } else {
      setState({loading:false});
    }
  }catch(e){
    console.warn("Cloudinary sync failed:",e);
    setState({loading:false});
  }
}

function resolveActiveClass(photos){
  let activeClass="xb";
  const ranges=getClassRanges();
  for(const r of [...ranges].reverse()){
    if(r.start&&r.end&&photos.some(p=>p.date>=r.start&&p.date<=r.end)){activeClass=r.key;break;}
  }
  return activeClass;
}

async function fetchFromCloudinary(){
  const cfg=getConfig();
  // Use Cloudinary's list endpoint — requires enabling "Resource list" in settings
  // Falls back to empty if not enabled
  const url=`https://res.cloudinary.com/${cfg.cloudName}/image/list/${cfg.indexFolder}.json`;
  const r=await fetch(url+"?_="+ Date.now());
  if(!r.ok) throw new Error("list failed: "+r.status);
  const data=await r.json();
  const resources=data.resources||[];
  return resources.map(res=>{
    // Parse context: date=2024-09-01|note=xxx
    let date="",note="";
    const ctx=res.context?.custom||{};
    if(ctx.date) date=ctx.date;
    if(ctx.note) note=decodeURIComponent(ctx.note);
    // Fallback: try to parse date from public_id or uploaded_at
    if(!date&&res.uploaded_at) date=res.uploaded_at.slice(0,10);
    return{id:res.public_id,date,note,url:res.secure_url,publicId:res.public_id};
  }).filter(p=>p.date);
}

function saveLocalIndex(photos){localStorage.setItem("gallery_photos",JSON.stringify(photos));}

async function uploadPhoto(file,date,note){
  const cfg=getConfig();
  const fd=new FormData();
  fd.append("file",file);fd.append("upload_preset",cfg.uploadPreset);
  fd.append("folder",cfg.indexFolder);
  fd.append("context",`date=${date}|note=${encodeURIComponent(note||"")}`);
  const r=await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,{method:"POST",body:fd});
  if(!r.ok){const err=await r.text();throw new Error("上传失败: "+r.status+" "+err);}
  const data=await r.json();
  return{id:data.public_id,date,note:note||"",url:data.secure_url,publicId:data.public_id};
}

async function handleSingleFiles(e){
  const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));
  const items=await Promise.all(files.map(async f=>{
    // Try EXIF first, then the ORIGINAL file.name (may be sanitized by OS)
    const[dataUrl, exifDate]=await Promise.all([toDataUrl(f), extractExifDate(f)]);
    let date=null, src="none";
    if(exifDate){date=exifDate;src="exif";}
    else{
      // On mobile, file.name is often sanitized to "image.jpg"
      // We expose the real name via webkitRelativePath or name
      const realName=f.name||"";
      const fnDate=extractDateFromFilename(realName);
      if(fnDate){date=fnDate;src="filename";}
      else if(f.lastModified){
        const d=new Date(f.lastModified);
        if(d.getFullYear()>=2018){
          date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
          src="modified";
        }
      }
    }
    return{file:f,dataUrl,detectedDate:date,detectedSrc:src,originalName:f.name};
  }));

  const detected=items.filter(x=>x.detectedDate);
  if(detected.length>0){
    // Use the first detected date as the form date
    state.formDate=detected[0].detectedDate;
    const srcLabel={exif:"EXIF拍摄时间",filename:"文件名",modified:"文件修改时间"}[detected[0].detectedSrc]||"";
    showToast("📅 自动识别："+detected[0].detectedDate+(srcLabel?" ("+srcLabel+")":""),3500);
  } else {
    // No date detected — show warning, clear date so user must fill manually
    showToast("⚠️ 未识别到日期，请手动选择",3500);
    // Keep existing formDate so user sees current value
  }
  setState({previews:[...state.previews,...items]});
  setTimeout(()=>{
    const inp=document.getElementById("fd-date");
    if(inp) inp.value=state.formDate||"";
  },30);
  e.target.value="";
}

async function handleSingleSave(){
  if(!state.previews.length){showToast("请先选择照片 📷");return;}
  setState({saving:true});
  const newPhotos=[];
  try{
    for(const pv of state.previews){
      const date=pv.detectedDate||state.formDate;
      if(!date){showToast("请填写日期 📅");setState({saving:false});return;}
      const photo=await uploadPhoto(pv.file,date,state.formNote);
      newPhotos.push(photo);
    }
    const all=[...state.photos,...newPhotos].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    saveLocalIndex(all);
    showToast(`🎉 已上传 ${newPhotos.length} 张！`);
    const cls=getClassForDate(newPhotos[0]?.date||state.formDate);
    setState({photos:all,activeClass:cls?cls.key:state.activeClass,previews:[],formNote:"",drawerOpen:false,saving:false});
  }catch(err){showToast("❌ "+err.message);setState({saving:false});}
}

    <div style="font-size:3rem;margin-bottom:12px">📂</div>
    <p style="font-weight:800;font-size:1.05rem;margin-bottom:6px">选择要导入的照片</p>
    <p style="font-size:.85rem;color:var(--text2);line-height:1.7;margin-bottom:24px">支持一次选择 200+ 张<br>自动从 <b>EXIF / 文件名</b> 识别日期，自动归入对应班级</p>
    <label style="display:inline-flex;align-items:center;gap:8px;padding:16px 28px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border-radius:16px;cursor:pointer;box-shadow:0 4px 16px rgba(255,123,172,.4);font-weight:800;font-size:1rem">
      <input type="file" accept="image/*" multiple id="bulk-input" style="display:none">🖼️ 选择所有照片
    </label>
  </div>`;}
  else{
    const fillBar=noDate>0?`<div class="fill-bar"><span>⚠️ ${noDate} 张未识别到日期</span><input type="date" id="fill-date" value="${fillDate}"><button onclick="applyFillDate()">批量填入</button></div>`:"";
    const items=bulkItems.map(item=>{
      const[srcLabel,srcColor]=srcColors[item.dateSrc]||["?","#999"];
      const cls=item.date?getClassForDate(item.date):null;
      return`<div class="bulk-item">
        <img src="${item.dataUrl}" alt="">
        <div class="meta">
          <div class="fname">${item.file.name}<span class="src-badge" style="background:${srcColor}22;color:${srcColor};border:1px solid ${srcColor}44">${srcLabel}</span>${cls?`<span style="font-size:.6rem;font-weight:800;margin-left:4px;color:${cls.color}">${cls.icon}${cls.name}</span>`:""}</div>
          <div class="fields">
            <input type="date" class="bi-date ${item.date?"":"missing"}" data-bid="${item.tempId}" value="${item.date||""}">
            <input type="text" class="bi-note" data-bid="${item.tempId}" value="${item.note||""}" placeholder="备注">
          </div>
        </div>
        <button class="rm" data-brm="${item.tempId}">✕</button>
      </div>`;
    }).join("");
    body=fillBar+items;
  }

  return`<div class="page">
    <div class="topbar">
      <button onclick="gotoGallery()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">←</button>
      <div class="topbar-title" style="flex:1;margin-left:12px">📦 批量导入</div>
      ${bulkItems.length?`<div class="pill" style="cursor:default">${bulkItems.length}张</div>`:""}
    </div>
    <div class="bulk-list">${body}</div>
    ${bulkItems.length&&!bulkSaving?`<div class="bottom-bar">
      <div class="info"><b>${ready}</b> 张已就绪${noDate?` · <span class="warn">${noDate} 张缺日期</span>`:""}<br><span style="font-size:.72rem;opacity:.7">缺日期的照片将被跳过</span></div>
      <button class="btn-save" style="flex:0 0 auto;width:auto;padding:13px 22px" onclick="handleBulkSave()">✨ 确认上传</button>
    </div>
    <label style="position:fixed;bottom:80px;right:20px;width:44px;height:44px;background:#fff;border:2px solid var(--blush);border-radius:50%;cursor:pointer;box-shadow:0 3px 12px rgba(255,123,172,.25);font-size:1.1rem;display:flex;align-items:center;justify-content:center">
      <input type="file" accept="image/*" multiple id="bulk-add" style="display:none">＋
    </label>`:""}
  </div>`;
}

function bindBulk(){
  const bi=document.getElementById("bulk-input");if(bi)bi.onchange=handleBulkFiles;
  const ba=document.getElementById("bulk-add");if(ba)ba.onchange=handleBulkFiles;
  document.querySelectorAll(".bi-date").forEach(inp=>{
    inp.onchange=e=>{const id=e.target.dataset.bid;state.bulkItems=state.bulkItems.map(x=>x.tempId===id?{...x,date:e.target.value}:x);e.target.classList.toggle("missing",!e.target.value);render();};
  });
  document.querySelectorAll(".bi-note").forEach(inp=>{
    inp.oninput=e=>{const id=e.target.dataset.bid;state.bulkItems=state.bulkItems.map(x=>x.tempId===id?{...x,note:e.target.value}:x);};
  });
  document.querySelectorAll("[data-brm]").forEach(b=>{b.onclick=()=>{state.bulkItems=state.bulkItems.filter(x=>x.tempId!==b.dataset.brm);render();};});
  const fd=document.getElementById("fill-date");if(fd)fd.onchange=e=>state.fillDate=e.target.value;
}

async function handleBulkFiles(e){
  const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));
  if(!files.length)return;e.target.value="";
  setState({bulkScanning:true});
  const BATCH=8,result=[];
  for(let i=0;i<files.length;i+=BATCH){
    const chunk=files.slice(i,i+BATCH);
    const processed=await Promise.all(chunk.map(async file=>{
      const[dataUrl,{date,src:dateSrc}]=await Promise.all([toDataUrl(file),smartDate(file)]);
      return{tempId:`tmp_${Math.random().toString(36).slice(2)}`,file,dataUrl,date:date||"",note:"",dateSrc};
    }));
    result.push(...processed);await new Promise(r=>setTimeout(r,0));
  }
  result.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const detected=result.filter(x=>x.date).length;
  state.bulkItems=[...state.bulkItems,...result];
  setState({bulkScanning:false});
  showToast(`📋 扫描 ${result.length} 张，${detected} 张识别到日期`,4000);
}

window.applyFillDate=function(){
  const fd=document.getElementById("fill-date");
  const date=fd?fd.value:state.fillDate;
  if(!date){showToast("请先选择日期");return;}
  state.bulkItems=state.bulkItems.map(x=>x.date?x:{...x,date});
  setState({fillDate:date});showToast("已批量填入日期");
};

window.handleBulkSave=async function(){
  const toSave=state.bulkItems.filter(x=>x.date);
  const skip=state.bulkItems.filter(x=>!x.date).length;
  if(!toSave.length){showToast("没有可上传的照片");return;}
  if(skip>0&&!confirm(`有 ${skip} 张没有填写日期，将跳过。\n继续上传 ${toSave.length} 张吗？`))return;
  setState({bulkSaving:true,bulkProgress:0});
  const newPhotos=[];
  try{
    for(let i=0;i<toSave.length;i++){
      const item=toSave[i];
      const photo=await uploadPhoto(item.file,item.date,item.note);
      newPhotos.push(photo);
      setState({bulkProgress:Math.round((i+1)/toSave.length*100)});
    }
    const all=[...state.photos,...newPhotos].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    saveLocalIndex(all);
    showToast(`🎉 成功上传 ${newPhotos.length} 张！`,4000);
    setState({photos:all,bulkItems:[],bulkSaving:false,bulkProgress:0,view:"gallery"});
  }catch(err){showToast("❌ "+err.message);setState({bulkSaving:false});}
};

window.gotoGallery=function(){if(state.bulkSaving)return;setState({view:"gallery"});};

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
if(isConfigured()){loadPhotos();}else{render();}
</script>
</body>
</html>
