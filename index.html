<body>

<div class="toast" id="toast"></div>
<script>
// ══════════════════════════════════════
// CLASSES CONFIG
// ══════════════════════════════════════
const CLASS_DEFS = [
  { key:"xb", name:"小班", icon:"🌱", color:"#C4725A", bg:"linear-gradient(135deg,#F0C8B4,#C4725A)", light:"#FDF0EC", startKey:"xb_start", endKey:"xb_end" },
  { key:"zb", name:"中班", icon:"🌸", color:"#4A7FA8", bg:"linear-gradient(135deg,#B8D4E8,#4A7FA8)", light:"#EEF4F8", startKey:"zb_start", endKey:"zb_end" },
  { key:"db", name:"大班", icon:"🌟", color:"#3A8050", bg:"linear-gradient(135deg,#B8DCC0,#3A8050)", light:"#EEF6F1", startKey:"db_start", endKey:"db_end" },
];

const DEFAULT_RANGES = {
  xb_start:"2023-09-01", xb_end:"2024-07-01",
  zb_start:"2024-09-01", zb_end:"2025-07-01",
  db_start:"2025-09-01", db_end:"2026-07-01",
};
function getClassRanges() {
  const s = JSON.parse(localStorage.getItem("class_ranges")||"{}");
  return CLASS_DEFS.map(c=>({
    ...c,
    start: s[c.startKey] || DEFAULT_RANGES[c.startKey] || "",
    end:   s[c.endKey]   || DEFAULT_RANGES[c.endKey]   || "",
  }));
}
function saveClassRanges(ranges) {
  const obj={};
  ranges.forEach(r=>{ obj[r.startKey]=r.start; obj[r.endKey]=r.end; });
  localStorage.setItem("class_ranges", JSON.stringify(obj));
}
function classRangesConfigured() {
  return getClassRanges().some(r=>r.start&&r.end);
}
function getClassForDate(dateStr) {
  if(!dateStr) return null;
  const ranges = getClassRanges();
  for(const r of ranges) {
    if(r.start && r.end && dateStr >= r.start && dateStr <= r.end) return r;
  }
  return null;
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
function fmtFull(d){if(!d)return"未知日期";const[y,m,day]=d.split("-");return`${y}年${parseInt(m)}月${parseInt(day)}日`;}
function fmtShort(d){if(!d)return"?";const[,m,day]=d.split("-");return`${parseInt(m)}/${parseInt(day)}`;}

function extractDateFromFilename(filename){
  const name=filename.replace(/\.[^.]+$/,"");
  const m=name.match(/(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
  if(m){const[,y,mo,d]=m;const yi=parseInt(y),moi=parseInt(mo),di=parseInt(d);if(yi>=2018&&yi<=2035&&moi>=1&&moi<=12&&di>=1&&di<=31)return`${y}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`;}
  return null;
}
function extractExifDate(file){
  return new Promise(resolve=>{
    if(!file.type.match(/jpe?g/i))return resolve(null);
    const reader=new FileReader();
    reader.onload=e=>{
      try{const buf=new Uint8Array(e.target.result);for(let i=0;i<buf.length-100;i++){if(buf[i]===0xFF&&buf[i+1]===0xE1){const seg=buf.slice(i+2,Math.min(i+65536,buf.length));const str=String.fromCharCode(...seg.slice(0,Math.min(4000,seg.length)));const m=str.match(/(\d{4}):(\d{2}):(\d{2})/);if(m&&parseInt(m[1])>=2018)return resolve(`${m[1]}-${m[2]}-${m[3]}`);break;}}resolve(null);}catch{resolve(null);}
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file.slice(0,65536));
  });
}
async function smartDate(file){
  const exif=await extractExifDate(file);if(exif)return{date:exif,src:"exif"};
  const fn=extractDateFromFilename(file.name);if(fn)return{date:fn,src:"filename"};
  if(file.lastModified){const d=new Date(file.lastModified);if(d.getFullYear()>=2018){const mo=String(d.getMonth()+1).padStart(2,"0");const day=String(d.getDate()).padStart(2,"0");return{date:`${d.getFullYear()}-${mo}-${day}`,src:"modified"};}}
  return{date:null,src:"none"};
}
function toDataUrl(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);})}
function showToast(msg,dur=2800){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove("show"),dur);}

async function loadPhotos(){
  setState({loading:true});
  try{
    const cached=JSON.parse(localStorage.getItem("gallery_photos")||"[]");
    if(cached.length){
      cached.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      setState({photos:cached,loading:false,activeClass:resolveActiveClass(cached)});
    }
  }catch{}
  try{
    const fresh=await fetchFromGitHub();
    if(fresh&&fresh.length){
      fresh.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      saveLocalIndex(fresh);
      setState({photos:fresh,loading:false,activeClass:resolveActiveClass(fresh)});
    } else {
      setState({loading:false});
    }
  }catch(e){
    console.warn("GitHub sync failed:",e);
    setState({loading:false});
  }
}

function resolveActiveClass(photos){
  let activeClass="xb";
  const ranges=getClassRanges();
  for(const r of [...ranges].reverse()){
    if(r.start&&r.end&&photos.some(p=>p.date>=r.start&&p.date<=r.end)){activeClass=r.key;break;}
  }
  return activeClass;
}

const GH_API = "https://api.github.com";
async function fetchFromGitHub(){
  const url=`https://zhouzhou718.github.io/baby-gallery/photos.json?_=${Date.now()}`;
  const r=await fetch(url);
  if(!r.ok) return [];
  return await r.json();
}
async function saveIndexToGitHub(photos){
  const cfg=getConfig();
  if(!cfg.githubToken||cfg.githubToken==="YOUR_GITHUB_TOKEN") return;
  const path="photos.json";
  const apiUrl=`${GH_API}/repos/zhouzhou718/baby-gallery/contents/${path}`;
  let sha="";
  try{
    const r=await fetch(apiUrl,{headers:{Authorization:`token ${cfg.githubToken}`,"Accept":"application/vnd.github.v3+json"}});
    if(r.ok){const d=await r.json();sha=d.sha||"";}
  }catch{}
  const body={message:"update photos index",content:btoa(unescape(encodeURIComponent(JSON.stringify(photos,null,2))))};
  if(sha) body.sha=sha;
  await fetch(apiUrl,{method:"PUT",headers:{Authorization:`token ${cfg.githubToken}`,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},body:JSON.stringify(body)});
}
function saveLocalIndex(photos){
  localStorage.setItem("gallery_photos",JSON.stringify(photos));
  saveIndexToGitHub(photos).catch(e=>console.warn("GitHub save failed:",e));
}

async function uploadPhoto(file,date,note){
  const cfg=getConfig();
  const fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset",cfg.uploadPreset);
  fd.append("tags","baby_gallery");
  fd.append("context",`date=${date}|note=${encodeURIComponent(note||"")}`);
  const r=await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,{method:"POST",body:fd});
  if(!r.ok){const err=await r.text();throw new Error("上传失败: "+r.status+" "+err);}
  const data=await r.json();
  return{id:data.public_id,date,note:note||"",url:data.secure_url,publicId:data.public_id};
}

function renderGallery(){

  const allYearTabs=[...new Set(photos.map(p=>p.date?.split("-")[0]).filter(Boolean))].sort((a,b)=>b-a);

    } else if(!photos.length){
      content=`<div class="empty"><div class="ico">🌿</div><p>还没有照片哦</p><small>点右下角按钮添加第一张</small><button class="btn-primary" onclick="setState({view:'bulk'})">批量导入</button></div>`;
    } else if(!yearPhotos.length){
      content=`<div class="empty"><div class="ico">📷</div><p>这一年还没有照片</p></div>`;
    } else {
      content=months.map(m=>{

async function handleSingleFiles(e){
  const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));
  const items=await Promise.all(files.map(async f=>{
    const[dataUrl, exifDate]=await Promise.all([toDataUrl(f), extractExifDate(f)]);
    let date=null, src="none";
    if(exifDate){date=exifDate;src="exif";}
    else{
      const realName=f.name||"";
      const fnDate=extractDateFromFilename(realName);
      if(fnDate){date=fnDate;src="filename";}
      else if(f.lastModified){
        const d=new Date(f.lastModified);
        if(d.getFullYear()>=2018){
          date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
          src="modified";
        }
      }
    }
    return{file:f,dataUrl,detectedDate:date,detectedSrc:src,originalName:f.name};
  }));
  const detected=items.filter(x=>x.detectedDate);
  if(detected.length>0){
    state.formDate=detected[0].detectedDate;
    showToast("📅 识别日期："+detected[0].detectedDate,3000);
  } else {
    showToast("⚠️ 未识别到日期，请手动选择",3000);
  }
  setState({previews:[...state.previews,...items]});
  setTimeout(()=>{const inp=document.getElementById("fd-date");if(inp)inp.value=state.formDate||"";},30);
  e.target.value="";
}

async function handleSingleSave(){
  if(!state.previews.length){showToast("请先选择照片");return;}
  const existingDates=new Set(state.photos.map(p=>p.date));
  const dupes=state.previews.filter(pv=>{const d=pv.detectedDate||state.formDate;return d&&existingDates.has(d);});
  if(dupes.length>0){
    const dates=dupes.map(pv=>pv.detectedDate||state.formDate).join("、");
    showToast(`⚠️ ${dates} 已有照片，已跳过`,4000);
    const fresh=state.previews.filter(pv=>{const d=pv.detectedDate||state.formDate;return!d||!existingDates.has(d);});
    if(!fresh.length){setState({saving:false});return;}
    state.previews=fresh;
  }
  setState({saving:true});
  const newPhotos=[];
  try{
    for(const pv of state.previews){
      const date=pv.detectedDate||state.formDate;
      if(!date){showToast("请填写日期");setState({saving:false});return;}
      const photo=await uploadPhoto(pv.file,date,state.formNote);
      newPhotos.push(photo);
    }
    const all=[...state.photos,...newPhotos].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    saveLocalIndex(all);
    showToast(`已上传 ${newPhotos.length} 张`);
    const cls=getClassForDate(newPhotos[0]?.date||state.formDate);
    setState({photos:all,activeClass:cls?cls.key:state.activeClass,previews:[],formNote:"",drawerOpen:false,saving:false});
  }catch(err){showToast("❌ "+err.message);setState({saving:false});}
}

async function deletePhoto(id){
  if(!confirm("确定删除这张照片吗？"))return;
  const photos=state.photos.filter(p=>p.id!==id);
  saveLocalIndex(photos);setState({photos});showToast("已删除");
}

// ══════════════════════════════════════
// BULK
// ══════════════════════════════════════
function renderBulk(){
  const{bulkItems,bulkScanning,bulkSaving,bulkProgress,fillDate}=state;
  const noDate=bulkItems.filter(x=>!x.date).length;
  const ready=bulkItems.filter(x=>x.date).length;
  const srcColors={exif:["EXIF","#4CAF50"],filename:["文件名","#5D8CAE"],modified:["修改时间","#D4834A"],none:["未识别","#CC6666"]};

  let body="";
  if(bulkScanning){body=`<div class="empty"><div class="ico spin" style="font-size:2rem">🌸</div><p>正在扫描…</p></div>`;}
  else if(bulkSaving){body=`<div class="progress-wrap"><div style="font-size:2rem;margin-bottom:16px">📤</div><p style="font-weight:600;font-size:.95rem;color:var(--ink2);margin-bottom:16px">正在上传照片</p><div class="progress-bar-bg"><div class="progress-bar" style="width:${bulkProgress}%"></div></div><p style="color:var(--stone);font-weight:500;font-size:.82rem;margin-top:8px">${bulkProgress}%</p></div>`;}
  else if(!bulkItems.length){body=`<div style="text-align:center;padding:50px 16px 20px">
    <div style="font-size:2.5rem;margin-bottom:14px">📂</div>
    <p style="font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--ink);margin-bottom:6px">选择要导入的照片</p>
    <p style="font-size:.82rem;color:var(--stone);line-height:1.7;margin-bottom:24px">支持一次选择 200+ 张<br>自动从文件名识别日期</p>
    <label style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--terra);color:#fff;border-radius:12px;cursor:pointer;font-weight:600;font-size:.9rem;letter-spacing:.3px">
      <input type="file" accept="image/*" multiple id="bulk-input" style="display:none">选择所有照片
    </label>
  </div>`;}
  else{
    const fillBar=noDate>0?`<div class="fill-bar"><span>⚠️ ${noDate} 张未识别日期</span><input type="date" id="fill-date" value="${fillDate}"><button onclick="applyFillDate()">批量填入</button></div>`:"";
    const items=bulkItems.map(item=>{
      const[srcLabel,srcColor]=srcColors[item.dateSrc]||["?","#999"];
      const cls=item.date?getClassForDate(item.date):null;
      return`<div class="bulk-item">
        <img src="${item.dataUrl}" alt="">
        <div class="meta">
          <div class="fname">${item.file.name}<span class="src-badge" style="background:${srcColor}18;color:${srcColor}">${srcLabel}</span>${cls?`<span style="font-size:.6rem;font-weight:600;margin-left:4px;color:${cls.color}">${cls.icon}${cls.name}</span>`:""}</div>
          <div class="fields">
            <input type="date" class="bi-date ${item.date?"":"missing"}" data-bid="${item.tempId}" value="${item.date||""}">
            <input type="text" class="bi-note" data-bid="${item.tempId}" value="${item.note||""}" placeholder="备注">
          </div>
        </div>
        <button class="rm" data-brm="${item.tempId}">✕</button>
      </div>`;
    }).join("");
    body=fillBar+items;
  }

  return`<div class="page">
    <div class="topbar">
      <button onclick="gotoGallery()" class="icon-btn">←</button>
      <div class="topbar-logo" style="margin-left:12px;flex:1">
        <div class="t1" style="font-size:1rem">批量导入</div>
        ${bulkItems.length?`<div class="t2">${bulkItems.length} 张照片</div>`:""}
      </div>
    </div>
    <div class="bulk-list">${body}</div>
    ${bulkItems.length&&!bulkSaving?`<div class="bottom-bar">
      <div class="info"><b>${ready}</b> 张已就绪${noDate?` · <span class="warn">${noDate} 张缺日期</span>`:""}</div>
      <button class="btn-save" style="flex:0 0 auto;width:auto;padding:13px 24px" onclick="handleBulkSave()">确认上传</button>
    </div>
    <label style="position:fixed;bottom:80px;right:20px;width:42px;height:42px;background:var(--white);border:1.5px solid var(--sand2);border-radius:50%;cursor:pointer;box-shadow:0 2px 10px var(--shadow);font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--stone)">
      <input type="file" accept="image/*" multiple id="bulk-add" style="display:none">＋
    </label>`:""}
  </div>`;
}

function bindBulk(){
  const bi=document.getElementById("bulk-input");if(bi)bi.onchange=handleBulkFiles;
  const ba=document.getElementById("bulk-add");if(ba)ba.onchange=handleBulkFiles;
  document.querySelectorAll(".bi-date").forEach(inp=>{
    inp.onchange=e=>{const id=e.target.dataset.bid;state.bulkItems=state.bulkItems.map(x=>x.tempId===id?{...x,date:e.target.value}:x);e.target.classList.toggle("missing",!e.target.value);render();};
  });
  document.querySelectorAll(".bi-note").forEach(inp=>{
    inp.oninput=e=>{const id=e.target.dataset.bid;state.bulkItems=state.bulkItems.map(x=>x.tempId===id?{...x,note:e.target.value}:x);};
  });
  document.querySelectorAll("[data-brm]").forEach(b=>{b.onclick=()=>{state.bulkItems=state.bulkItems.filter(x=>x.tempId!==b.dataset.brm);render();};});
  const fd=document.getElementById("fill-date");if(fd)fd.onchange=e=>state.fillDate=e.target.value;
}

async function handleBulkFiles(e){
  const files=Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));
  if(!files.length)return;e.target.value="";
  setState({bulkScanning:true});
  const BATCH=8,result=[];
  for(let i=0;i<files.length;i+=BATCH){
    const chunk=files.slice(i,i+BATCH);
    const processed=await Promise.all(chunk.map(async file=>{
      const[dataUrl,{date,src:dateSrc}]=await Promise.all([toDataUrl(file),smartDate(file)]);
      return{tempId:`tmp_${Math.random().toString(36).slice(2)}`,file,dataUrl,date:date||"",note:"",dateSrc};
    }));
    result.push(...processed);await new Promise(r=>setTimeout(r,0));
  }
  result.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const detected=result.filter(x=>x.date).length;
  state.bulkItems=[...state.bulkItems,...result];
  setState({bulkScanning:false});
  showToast(`扫描 ${result.length} 张，${detected} 张识别到日期`,4000);
}

window.applyFillDate=function(){
  const fd=document.getElementById("fill-date");
  const date=fd?fd.value:state.fillDate;
  if(!date){showToast("请先选择日期");return;}
  state.bulkItems=state.bulkItems.map(x=>x.date?x:{...x,date});
  setState({fillDate:date});showToast("已批量填入日期");
};

window.handleBulkSave=async function(){
  const existingDates=new Set(state.photos.map(p=>p.date));
  const allWithDate=state.bulkItems.filter(x=>x.date);
  const skip=state.bulkItems.filter(x=>!x.date).length;
  const dupes=allWithDate.filter(x=>existingDates.has(x.date));
  const toSave=allWithDate.filter(x=>!existingDates.has(x.date));
  if(dupes.length>0){
    const msg=`以下日期已有照片，将跳过：\n${dupes.map(x=>x.date).join("、")}`;
    if(!confirm(msg+"\n\n继续上传剩余 "+toSave.length+" 张吗？"))return;
  }
  if(!toSave.length){showToast("所有照片日期都已存在");return;}
  if(skip>0&&!confirm(`另有 ${skip} 张没有日期，将跳过。\n确认上传 ${toSave.length} 张？`))return;
  setState({bulkSaving:true,bulkProgress:0});
  const newPhotos=[];
  try{
    for(let i=0;i<toSave.length;i++){
      const item=toSave[i];
      const photo=await uploadPhoto(item.file,item.date,item.note);
      newPhotos.push(photo);
      setState({bulkProgress:Math.round((i+1)/toSave.length*100)});
    }
    const all=[...state.photos,...newPhotos].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    saveLocalIndex(all);
    showToast(`成功上传 ${newPhotos.length} 张${dupes.length?`，跳过 ${dupes.length} 张重复`:""}`,4000);
    setState({photos:all,bulkItems:[],bulkSaving:false,bulkProgress:0,view:"gallery"});
  }catch(err){showToast("❌ "+err.message);setState({bulkSaving:false});}
};

window.gotoGallery=function(){if(state.bulkSaving)return;setState({view:"gallery"});};

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
loadPhotos();
</script>
