<style>
:root {
  --rose: #FF7BAC;
  --rose2: #FF5A9E;
  --blush: #FFB5C8;
  --cream: #FFF8F0;
  --peach: #FFD4A8;
  --text: #3D2C35;
  --text2: #8B6B7A;
  --shadow: rgba(255,123,172,.15);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; font-family:'Nunito','PingFang SC',sans-serif; background:var(--cream); color:var(--text); }
::-webkit-scrollbar { display:none; }

#app { display:flex; flex-direction:column; height:100dvh; max-width:480px; margin:0 auto; overflow:hidden; }

/* top bar */
.topbar { background:linear-gradient(135deg,var(--rose),var(--rose2)); color:#fff; padding:14px 16px 12px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; box-shadow:0 4px 20px rgba(255,123,172,.35); z-index:10; }
.topbar-title { font-size:1.3rem; letter-spacing:2px; font-weight:800; }
.topbar-right { display:flex; gap:8px; align-items:center; }
.pill { background:rgba(255,255,255,.22); padding:5px 12px; border-radius:20px; font-size:.76rem; font-weight:700; border:none; color:#fff; cursor:pointer; white-space:nowrap; }
.pill:active { opacity:.8; }

/* year tabs */
.year-bar { background:#fff; border-bottom:1px solid #F0E0E8; overflow-x:auto; display:flex; flex-shrink:0; scrollbar-width:none; }
.year-tab { padding:11px 20px; border:none; border-bottom:3px solid transparent; background:none; font-size:.9rem; font-weight:700; color:var(--text2); cursor:pointer; white-space:nowrap; flex-shrink:0; font-family:'Nunito',sans-serif; transition:all .2s; }
.year-tab.active { color:var(--rose); border-bottom-color:var(--rose); }

/* content */
.content { flex:1; overflow-y:auto; padding:16px 14px 130px;
  background:radial-gradient(circle at 10% 20%,rgba(255,181,200,.1) 0%,transparent 50%),
             radial-gradient(circle at 90% 80%,rgba(184,228,255,.1) 0%,transparent 50%),
             var(--cream);
}

/* month group */
.month-hd { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.month-badge { background:linear-gradient(135deg,var(--peach),#FFB870); color:#fff; font-weight:800; font-size:.82rem; padding:5px 14px; border-radius:50px; white-space:nowrap; }
.month-line { flex:1; height:1.5px; background:linear-gradient(90deg,#FFD4A8,transparent); }
.month-count { font-size:.75rem; color:var(--text2); font-weight:700; background:#F5E8F0; padding:3px 10px; border-radius:20px; }

/* photo grid */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.card { background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 3px 16px var(--shadow); cursor:pointer; position:relative; transition:transform .12s; }
.card:active { transform:scale(.96); }
.card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.card .info { padding:9px 12px; }
.card .info .dt { font-size:.74rem; color:var(--text2); font-weight:700; }
.card .info .note { font-size:.82rem; color:var(--text); margin-top:2px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .del { position:absolute; top:7px; right:7px; width:28px; height:28px; background:rgba(255,255,255,.92); border:none; border-radius:50%; cursor:pointer; font-size:.82rem; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.15); }

/* empty */
.empty { text-align:center; padding:70px 20px; color:var(--text2); }

/* FAB */

@media(max-width:480px) { .fab { right:20px; } }

.drawer-handle { width:40px; height:4px; background:#E0D0D8; border-radius:2px; margin:12px auto 16px; }

.form-row { display:flex; gap:10px; margin-bottom:12px; }
.form-group { flex:1; }

.form-group input[type=date], .form-group input[type=text] { width:100%; padding:11px 13px; border:2px solid #F0E0E8; border-radius:12px; font-family:'Nunito',sans-serif; font-size:.92rem; color:var(--text); background:var(--cream); outline:none; -webkit-appearance:none; }

.media-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.media-btn { padding:14px 10px; border:2px solid #F0E0E8; border-radius:14px; background:var(--cream); font-family:'Nunito',sans-serif; font-size:.9rem; font-weight:700; color:var(--text); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; position:relative; }
.media-btn input { position:absolute; inset:0; opacity:0; width:100%; height:100%; cursor:pointer; }

.preview-strip { display:flex; gap:8px; overflow-x:auto; margin-bottom:12px; padding-bottom:4px; }
.preview-strip img { width:52px; height:52px; border-radius:10px; object-fit:cover; border:2px solid var(--blush); flex-shrink:0; }
.btn-save { width:100%; padding:15px; background:linear-gradient(135deg,var(--rose),var(--rose2)); color:#fff; border:none; border-radius:14px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(255,123,172,.4); letter-spacing:.5px; }
.btn-save:disabled { background:var(--blush); cursor:not-allowed; }

/* bulk page */
.page { display:flex; flex-direction:column; height:100dvh; max-width:480px; margin:0 auto; overflow:hidden; }
.bulk-list { flex:1; overflow-y:auto; padding:16px 14px 120px; }
.bulk-item { display:flex; gap:10px; background:#fff; border-radius:14px; padding:10px 12px; margin-bottom:10px; box-shadow:0 2px 10px rgba(255,123,172,.1); align-items:flex-start; }
.bulk-item img { width:56px; height:56px; border-radius:10px; object-fit:cover; flex-shrink:0; }
.bulk-item .meta { flex:1; min-width:0; }
.bulk-item .fname { font-size:.72rem; color:var(--text2); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px; margin-bottom:4px; }
.bulk-item .fields { display:flex; gap:6px; }
.bulk-item input[type=date] { flex:0 0 auto; width:130px; padding:6px 8px; border:1.5px solid #F0E0E8; border-radius:8px; font-family:'Nunito',sans-serif; font-size:.8rem; outline:none; background:var(--cream); }
.bulk-item input[type=date].missing { border-color:#FF9999; background:#FFF0F0; }
.bulk-item input[type=text] { flex:1; padding:6px 8px; border:1.5px solid #F0E0E8; border-radius:8px; font-family:'Nunito',sans-serif; font-size:.8rem; outline:none; background:var(--cream); min-width:0; }
.bulk-item .rm { background:none; border:none; cursor:pointer; color:#CCA0B0; font-size:1rem; flex-shrink:0; padding:2px; }
.src-badge { display:inline-block; font-size:.6rem; padding:1px 6px; border-radius:8px; font-weight:700; margin-left:4px; }
.fill-bar { background:#FFF0F5; border:1.5px solid var(--blush); border-radius:14px; padding:12px 14px; margin-bottom:16px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.fill-bar span { font-size:.82rem; font-weight:700; color:var(--rose2); flex:1 1 160px; }
.fill-bar input { padding:7px 10px; border:1.5px solid var(--blush); border-radius:10px; font-family:'Nunito',sans-serif; font-size:.85rem; outline:none; background:#fff; }
.fill-bar button { padding:7px 14px; background:var(--rose); color:#fff; border:none; border-radius:10px; font-weight:700; font-size:.82rem; cursor:pointer; white-space:nowrap; }
.bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:#fff; border-top:1px solid #F0E0E8; padding:12px 16px 28px; display:flex; gap:10px; align-items:center; z-index:30; }
.bottom-bar .info { flex:1; font-size:.82rem; color:var(--text2); font-weight:700; line-height:1.4; }
.bottom-bar .info b { color:var(--rose); font-weight:800; }
.bottom-bar .info .warn { color:#FF9800; }

/* progress */
.progress-wrap { text-align:center; padding:60px 20px; }
.progress-wrap .ico { font-size:2.5rem; margin-bottom:16px; }
.progress-bar-bg { background:#F0E0E8; border-radius:99px; height:10px; overflow:hidden; margin:0 20px 8px; }
.progress-bar { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--rose),var(--rose2)); transition:width .3s; }

/* lightbox */
.lightbox { position:fixed; inset:0; background:rgba(15,8,12,.94); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.lightbox img { max-width:100%; max-height:72vh; border-radius:14px; object-fit:contain; animation:popIn .25s ease; }
.lightbox .lb-info { margin-top:16px; text-align:center; color:#fff; }
.lightbox .lb-date { font-weight:800; font-size:1rem; color:var(--blush); }
.lightbox .lb-note { font-size:.88rem; opacity:.75; margin-top:4px; }
.lightbox .lb-close { position:fixed; top:20px; right:20px; width:40px; height:40px; background:rgba(255,255,255,.15); border:none; border-radius:50%; font-size:1.1rem; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* toast */
.toast { position:fixed; top:72px; left:50%; transform:translateX(-50%) translateY(-16px); background:linear-gradient(135deg,var(--rose),var(--rose2)); color:#fff; padding:11px 22px; border-radius:50px; font-weight:700; font-size:.9rem; z-index:300; box-shadow:0 6px 20px rgba(255,123,172,.4); transition:all .35s cubic-bezier(.34,1.56,.64,1); opacity:0; pointer-events:none; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* setup screen */
.setup { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100dvh; padding:30px 24px; text-align:center; background:var(--cream); }
.setup h2 { font-size:1.5rem; color:var(--rose); margin-bottom:8px; }
.setup p { color:var(--text2); font-size:.9rem; line-height:1.7; margin-bottom:20px; }
.setup .field { width:100%; margin-bottom:12px; text-align:left; }
.setup .field label { display:block; font-size:.78rem; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
.setup .field input { width:100%; padding:13px 15px; border:2px solid #F0E0E8; border-radius:14px; font-family:'Nunito',sans-serif; font-size:.95rem; color:var(--text); background:#fff; outline:none; }
.setup .field input:focus { border-color:var(--rose); }
.setup .hint { font-size:.78rem; color:var(--text2); opacity:.75; margin-top:4px; }

@keyframes slideUp { from{transform:translateX(-50%) translateY(100%)} to{transform:translateX(-50%) translateY(0)} }
@keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
.spin { animation:spin 1s linear infinite; display:inline-block; }
</style>

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CLOUDINARY API
// ══════════════════════════════════════════════════════════════
const CL = {
  // Upload a file, returns { secure_url, public_id }
  async upload(file, folder, tags=[]) {
    const cfg = getConfig();
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", cfg.uploadPreset);
    fd.append("folder", folder);
    if (tags.length) fd.append("tags", tags.join(","));
    const r = await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`, { method:"POST", body:fd });
    if (!r.ok) throw new Error("上传失败: " + r.status);
    return r.json();
  },

  // List resources in a folder, returns array of { public_id, secure_url, context }
  async list(folder) {
    const cfg = getConfig();
    // Use search API via unsigned search (needs search enabled in settings, or use resource list)
    const r = await fetch(
      `https://res.cloudinary.com/${cfg.cloudName}/image/list/${folder}.json`,
      { cache:"no-store" }
    );
    if (!r.ok) return [];
    const data = await r.json();
    return data.resources || [];
  },

  // Delete (needs API secret — skip for now, just hide locally)
  // For client-side only apps, we soft-delete via a hidden tag
};

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const MONTHS = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

function fmtFull(d) {
  if (!d) return "未知日期";
  const [y,m,day] = d.split("-");
  return `${y}年${parseInt(m)}月${parseInt(day)}日`;
}
function fmtShort(d) {
  if (!d) return "?";
  const [,m,day] = d.split("-");
  return `${parseInt(m)}/${parseInt(day)}`;
}

function extractDateFromFilename(filename) {
  const name = filename.replace(/\.[^.]+$/, "");
  const m = name.match(/(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
  if (m) {
    const [,y,mo,d] = m;
    const yi=parseInt(y), moi=parseInt(mo), di=parseInt(d);
    if (yi>=2018&&yi<=2035&&moi>=1&&moi<=12&&di>=1&&di<=31)
      return `${y}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`;
  }
  return null;
}

function extractExifDate(file) {
  return new Promise(resolve => {
    if (!file.type.match(/jpe?g/i)) return resolve(null);
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const buf = new Uint8Array(e.target.result);
        for (let i=0;i<buf.length-100;i++) {
          if (buf[i]===0xFF&&buf[i+1]===0xE1) {
            const seg = buf.slice(i+2,Math.min(i+65536,buf.length));
            const str = String.fromCharCode(...seg.slice(0,Math.min(4000,seg.length)));
            const m = str.match(/(\d{4}):(\d{2}):(\d{2})/);
            if (m&&parseInt(m[1])>=2018) return resolve(`${m[1]}-${m[2]}-${m[3]}`);
            break;
          }
        }
        resolve(null);
      } catch { resolve(null); }
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file.slice(0,65536));
  });
}

async function smartDate(file) {
  const exif = await extractExifDate(file);
  if (exif) return {date:exif,src:"exif"};
  const fn = extractDateFromFilename(file.name);
  if (fn) return {date:fn,src:"filename"};
  if (file.lastModified) {
    const d=new Date(file.lastModified);
    if (d.getFullYear()>=2018) {
      const mo=String(d.getMonth()+1).padStart(2,"0");
      const day=String(d.getDate()).padStart(2,"0");
      return {date:`${d.getFullYear()}-${mo}-${day}`,src:"modified"};
    }
  }
  return {date:null,src:"none"};
}

function toDataUrl(file) {
  return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
}

function showToast(msg, dur=2800) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("show"),dur);
}

// ══════════════════════════════════════════════════════════════
// CONFIG (saved in localStorage for convenience)
// ══════════════════════════════════════════════════════════════
function getConfig() {
  // First check hardcoded CONFIG
  if (typeof CONFIG !== "undefined" &&
      CONFIG.cloudName !== "YOUR_CLOUD_NAME" &&
      CONFIG.uploadPreset !== "YOUR_UPLOAD_PRESET") {
    return CONFIG;
  }
  // Then check localStorage (set via setup screen)
  const saved = JSON.parse(localStorage.getItem("cl_config")||"{}");
  return {
    cloudName: saved.cloudName||"",
    uploadPreset: saved.uploadPreset||"",
    indexFolder: saved.indexFolder||"baby_gallery",
  };
}

function isConfigured() {
  const c = getConfig();
  return c.cloudName && c.cloudName !== "YOUR_CLOUD_NAME" &&
         c.uploadPreset && c.uploadPreset !== "YOUR_UPLOAD_PRESET";
}

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let state = {
  view: "gallery",       // gallery | bulk | setup
  photos: [],            // { id, date, note, url, publicId }
  loading: true,
  activeYear: null,
  lightbox: null,
  drawerOpen: false,
  saving: false,
  // single add
  formDate: new Date().toISOString().split("T")[0],
  formNote: "",
  previews: [],          // { file, dataUrl }
  // bulk
  bulkItems: [],         // { tempId, file, dataUrl, date, note, dateSrc }
  bulkScanning: false,
  bulkSaving: false,
  bulkProgress: 0,
  fillDate: new Date().toISOString().split("T")[0],
  // setup
  setupCloud: "",
  setupPreset: "",
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ══════════════════════════════════════════════════════════════
// CLOUDINARY DATA LAYER
// Using Cloudinary tags to store metadata: date_YYYY-MM-DD, note_xxx
// Photos listed via the list endpoint (public folder JSON)
// ══════════════════════════════════════════════════════════════
async function loadPhotos() {
  setState({loading:true});
  try {
    const cfg = getConfig();
    // Load from localStorage index first (faster, works offline)
    const cached = JSON.parse(localStorage.getItem("gallery_photos")||"[]");
    if (cached.length) {
      cached.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      const years=[...new Set(cached.map(p=>p.date?.split("-")[0]).filter(Boolean))].sort((a,b)=>b-a);
      setState({photos:cached, loading:false, activeYear:years[0]||null});
    } else {
      setState({loading:false});
    }
  } catch(e) {
    setState({loading:false});
  }
}

function saveLocalIndex(photos) {
  localStorage.setItem("gallery_photos", JSON.stringify(photos));
}

async function uploadPhoto(file, date, note) {
  const cfg = getConfig();
  const tags = [`date_${date}`, note ? `note_${encodeURIComponent(note)}` : "no_note"];
  // Use context to store date+note (Cloudinary context key=value)
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", cfg.uploadPreset);
  fd.append("folder", cfg.indexFolder);
  fd.append("context", `date=${date}|note=${encodeURIComponent(note||"")}`);
  const r = await fetch(`https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,{method:"POST",body:fd});
  if (!r.ok) {
    const err = await r.text();
    throw new Error("上传失败: " + r.status + " " + err);
  }
  const data = await r.json();
  return {
    id: data.public_id,
    date,
    note: note||"",
    url: data.secure_url,
    publicId: data.public_id,
  };
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");

  if (!isConfigured() || state.view === "setup") {
    app.innerHTML = renderSetup();
    bindSetup();
    return;
  }
  if (state.view === "bulk") {
    app.innerHTML = renderBulk();
    bindBulk();
    return;
  }
  app.innerHTML = renderGallery();
  bindGallery();
}

// ── SETUP SCREEN ──
function renderSetup() {
  return `
  <div class="setup">
    <div style="font-size:3rem;margin-bottom:16px">🌸</div>
    <h2>配置 Cloudinary</h2>
    <p>照片将上传到你的 Cloudinary 账号，任何设备都能访问。<br>
    <a href="https://cloudinary.com/users/register/free" target="_blank" style="color:var(--rose)">点这里免费注册</a></p>

    <div class="field">
      <label>Cloud Name</label>
      <input id="inp-cloud" type="text" placeholder="例如: mycloud123" value="${state.setupCloud}">
      <div class="hint">注册后在 Dashboard 首页可以看到</div>
    </div>
    <div class="field">
      <label>Upload Preset</label>
      <input id="inp-preset" type="text" placeholder="例如: baby_photos" value="${state.setupPreset}">
      <div class="hint">Settings → Upload → Upload Presets → 新建一个 Unsigned preset</div>
    </div>

    <button class="btn-primary" style="width:100%;margin-top:4px" onclick="saveSetup()">✅ 保存并开始使用</button>

    <div style="margin-top:20px;font-size:.78rem;color:var(--text2);line-height:1.8;text-align:left;background:#FFF0F5;padding:14px 16px;border-radius:14px;width:100%">
      <b>如何获取 Upload Preset：</b><br>
      1. 登录 Cloudinary → Settings（齿轮图标）<br>
      2. 点 Upload 标签页<br>
      3. 滚动到 Upload presets → Add upload preset<br>
      4. Signing mode 选 <b>Unsigned</b><br>
      5. 复制 Preset name 填到上面
    </div>
  </div>`;
}

function bindSetup() {
  document.getElementById("inp-cloud").oninput = e => state.setupCloud = e.target.value.trim();
  document.getElementById("inp-preset").oninput = e => state.setupPreset = e.target.value.trim();
}

window.saveSetup = function() {
  const cloud = document.getElementById("inp-cloud").value.trim();
  const preset = document.getElementById("inp-preset").value.trim();
  if (!cloud || !preset) { showToast("请填写完整信息"); return; }
  localStorage.setItem("cl_config", JSON.stringify({cloudName:cloud, uploadPreset:preset, indexFolder:"baby_gallery"}));
  setState({view:"gallery", setupCloud:cloud, setupPreset:preset});
  loadPhotos();
};

// ── GALLERY ──
function renderGallery() {
  const { photos, loading, activeYear } = state;
  const years = [...new Set(photos.map(p=>p.date?.split("-")[0]).filter(Boolean))].sort((a,b)=>b-a);
  const yearPhotos = photos.filter(p=>activeYear&&p.date?.startsWith(activeYear));
  const byMonth = yearPhotos.reduce((acc,p)=>{const m=p.date.split("-")[1];(acc[m]=acc[m]||[]).push(p);return acc;},{});
  const thisYear = new Date().getFullYear().toString();
  const thisYearDays = new Set(photos.filter(p=>p.date?.startsWith(thisYear)).map(p=>p.date)).size;

  let content = "";
  if (loading) {
    content = `<div class="empty"><div class="ico spin">🌸</div><p>加载中…</p></div>`;
  } else if (!photos.length) {
    content = `<div class="empty">
      <div class="ico">🌸</div>
      <p>还没有照片哦～</p>
      <small>点击右下角 <b style="color:var(--rose)">+</b> 添加单张<br>或点顶部 <b style="color:var(--rose)">批量导入</b></small>
      <button class="btn-primary" onclick="setState({view:'bulk'})">📦 批量导入</button>
    </div>`;
  } else if (!activeYear || !yearPhotos.length) {
    content = `<div class="empty"><div class="ico">📷</div><p>这一年还没有照片</p></div>`;
  } else {
    content = Object.keys(byMonth).sort((a,b)=>b-a).map(m => {
      const list = byMonth[m].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
      return `<div style="margin-bottom:28px">
        <div class="month-hd">
          <span class="month-badge">🌸 ${MONTHS[parseInt(m)-1]}</span>
          <div class="month-line"></div>
          <span class="month-count">${list.length}张</span>
        </div>
        <div class="grid">
          ${list.map(p=>`
            <div class="card" data-id="${p.id}">
              <img src="${p.url}" loading="lazy" alt="">
              <div class="info">
                <div class="dt">📅 ${fmtShort(p.date)}</div>
                ${p.note?`<div class="note">💬 ${p.note}</div>`:""}
              </div>
              <button class="del" data-del="${p.id}">🗑️</button>
            </div>`).join("")}
        </div>
      </div>`;
    }).join("");
  }

  return `
  <div id="gallery-page" style="display:flex;flex-direction:column;height:100dvh;overflow:hidden">
    <div class="topbar">
      <div class="topbar-title">🌸 宝贝成长相册</div>
      <div class="topbar-right">
        <button class="pill" onclick="setState({view:'bulk'})">📦 批量导入</button>
        <div class="pill" style="cursor:default">${loading?"加载中…":`共${photos.length}张·今年${thisYearDays}天`}</div>
      </div>
    </div>
    ${years.length?`
    <div class="year-bar">
      ${years.map(y=>`<button class="year-tab ${y===activeYear?"active":""}" data-year="${y}">${y}年</button>`).join("")}
    </div>`:""}
    <div class="content" id="gallery-content">${content}</div>
    <button class="fab" onclick="setState({drawerOpen:true})">+</button>
    ${state.drawerOpen ? renderDrawer() : ""}
    ${state.lightbox ? renderLightbox() : ""}
  </div>`;
}

function renderDrawer() {
  const {formDate,formNote,previews,saving} = state;
  return `
  <div class="overlay" id="overlay"></div>
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">📷 添加照片</div>
    <div class="form-row">
      <div class="form-group">
        <label>📅 日期</label>
        <input type="date" id="fd-date" value="${formDate}">
      </div>
      <div class="form-group">
        <label>💬 备注</label>
        <input type="text" id="fd-note" placeholder="今天很开心～" value="${formNote}">
      </div>
    </div>
    <div class="media-btns">
      <label class="media-btn">
        <input type="file" accept="image/*" capture="environment" id="cam-input">
        <span class="ico">📷</span><span>拍照</span><span class="cnt" id="cnt-cam"></span>
      </label>
      <label class="media-btn">
        <input type="file" accept="image/*" multiple id="gal-input">
        <span class="ico">🖼️</span><span>相册</span><span class="cnt" id="cnt-gal"></span>
      </label>
    </div>
    ${previews.length?`<div class="preview-strip">${previews.map((_,i)=>`<img src="${previews[i].dataUrl}" data-pi="${i}">`).join("")}</div>`:""}
    <button class="btn-save" id="btn-save" ${saving?"disabled":""}>
      ${saving?`⏳ 上传中…`:`✨ 保存${previews.length?` ${previews.length} 张`:""}`}
    </button>
  </div>`;
}

function renderLightbox() {
  const p = state.lightbox;
  return `
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <img src="${p.url}" alt="">
    <div class="lb-info">
      <div class="lb-date">📅 ${fmtFull(p.date)}</div>
      ${p.note?`<div class="lb-note">💬 ${p.note}</div>`:""}
    </div>
  </div>`;
}

function bindGallery() {
  // year tabs
  document.querySelectorAll(".year-tab").forEach(b=>{
    b.onclick=()=>{ setState({activeYear:b.dataset.year}); };
  });
  // card click → lightbox
  document.querySelectorAll(".card").forEach(c=>{
    c.onclick=e=>{
      if (e.target.dataset.del) return;
      const p = state.photos.find(x=>x.id===c.dataset.id);
      if (p) setState({lightbox:p});
    };
  });
  // delete
  document.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); deletePhoto(b.dataset.del); };
  });
  // overlay / close drawer
  const ov = document.getElementById("overlay");
  if (ov) ov.onclick=()=>{ if(!state.saving) setState({drawerOpen:false}); };
  // lightbox close
  const lb = document.getElementById("lightbox");
  if (lb) {
    lb.onclick=()=>setState({lightbox:null});
    document.getElementById("lb-close").onclick=e=>{e.stopPropagation();setState({lightbox:null});};
  }
  // form inputs
  const fdDate = document.getElementById("fd-date");
  if (fdDate) fdDate.onchange=e=>state.formDate=e.target.value;
  const fdNote = document.getElementById("fd-note");
  if (fdNote) fdNote.oninput=e=>state.formNote=e.target.value;
  // file inputs
  const camInput = document.getElementById("cam-input");
  if (camInput) camInput.onchange=e=>handleSingleFiles(e);
  const galInput = document.getElementById("gal-input");
  if (galInput) galInput.onchange=e=>handleSingleFiles(e);
  // save
  const btnSave = document.getElementById("btn-save");
  if (btnSave) btnSave.onclick=handleSingleSave;
  // esc
  document.onkeydown=e=>{ if(e.key==="Escape") setState({lightbox:null,drawerOpen:false}); };
}

async function handleSingleFiles(e) {
  const files = Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));
  const items = await Promise.all(files.map(async f=>({file:f,dataUrl:await toDataUrl(f)})));
  setState({previews:[...state.previews,...items]});
  e.target.value="";
}

async function handleSingleSave() {
  if (!state.formDate) { showToast("请选择日期 📅"); return; }
  if (!state.previews.length) { showToast("请先选择照片 📷"); return; }
  setState({saving:true});
  const newPhotos = [];
  try {
    for (const pv of state.previews) {
      const photo = await uploadPhoto(pv.file, state.formDate, state.formNote);
      newPhotos.push(photo);
    }
    const all = [...state.photos,...newPhotos].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    saveLocalIndex(all);
    const years=[...new Set(all.map(p=>p.date?.split("-")[0]).filter(Boolean))].sort((a,b)=>b-a);
    showToast(`🎉 已上传 ${newPhotos.length} 张！`);
    setState({photos:all, activeYear:state.formDate.split("-")[0], previews:[], formNote:"", drawerOpen:false, saving:false});
  } catch(err) {
    showToast("❌ " + err.message);
    setState({saving:false});
  }
}

async function deletePhoto(id) {
  if (!confirm("确定删除这张照片吗？\n（图片会从本地记录中移除，Cloudinary 中的原文件需手动删除）")) return;
  const photos = state.photos.filter(p=>p.id!==id);
  saveLocalIndex(photos);
  setState({photos});
  showToast("已从记录中移除");
}

// ── BULK ──
function renderBulk() {
  const {bulkItems,bulkScanning,bulkSaving,bulkProgress,fillDate} = state;
  const noDate = bulkItems.filter(x=>!x.date).length;
  const ready = bulkItems.filter(x=>x.date).length;

  const srcColors = {exif:["EXIF","#4CAF50"],filename:["文件名","#2196F3"],modified:["修改时间","#FF9800"],none:["未识别","#F44336"]};

  let body = "";
  if (bulkScanning) {
    body = `<div class="empty"><div class="ico spin">🌸</div><p>正在扫描文件…</p></div>`;
  } else if (bulkSaving) {
    body = `<div class="progress-wrap">
      <div class="ico">💾</div>
      <p style="font-weight:800;margin-bottom:12px">正在上传照片…</p>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${bulkProgress}%"></div></div>
      <p style="color:var(--text2);font-weight:700;margin-top:8px">${bulkProgress}%</p>
    </div>`;
  } else if (!bulkItems.length) {
    body = `<div style="text-align:center;padding:40px 16px 20px">
      <div style="font-size:3rem;margin-bottom:12px">📂</div>
      <p style="font-weight:800;font-size:1.05rem;margin-bottom:6px">选择要导入的照片</p>
      <p style="font-size:.85rem;color:var(--text2);line-height:1.7;margin-bottom:24px">
        支持一次选择 200+ 张<br>
        自动从 <b>EXIF / 文件名 / 修改时间</b> 识别日期<br>
        文件名格式如 <b>2024-09-01.png</b> 可完美识别
      </p>
      <label style="display:inline-flex;flex-direction:column;align-items:center;gap:8px;padding:18px 32px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;border-radius:16px;cursor:pointer;box-shadow:0 4px 16px rgba(255,123,172,.4);font-weight:800;font-size:1rem">
        <input type="file" accept="image/*" multiple id="bulk-input" style="display:none">
        🖼️ 选择所有照片
      </label>
    </div>`;
  } else {
    const fillBar = noDate>0 ? `
      <div class="fill-bar">
        <span>⚠️ ${noDate} 张未识别到日期</span>
        <input type="date" id="fill-date" value="${fillDate}">
        <button onclick="applyFillDate()">批量填入</button>
      </div>` : "";
    const items = bulkItems.map((item,i)=>{
      const [srcLabel,srcColor] = srcColors[item.dateSrc]||["?","#999"];
      return `<div class="bulk-item" data-bi="${item.tempId}">
        <img src="${item.dataUrl}" alt="">
        <div class="meta">
          <div class="fname">${item.file.name} <span class="src-badge" style="background:${srcColor}22;color:${srcColor};border:1px solid ${srcColor}44">${srcLabel}</span></div>
          <div class="fields">
            <input type="date" class="bi-date ${item.date?'':'missing'}" data-bid="${item.tempId}" value="${item.date||''}">
            <input type="text" class="bi-note" data-bid="${item.tempId}" value="${item.note||''}" placeholder="备注">
          </div>
        </div>
        <button class="rm" data-brm="${item.tempId}">✕</button>
      </div>`;
    }).join("");
    body = fillBar + items;
  }

  return `
  <div class="page">
    <div class="topbar">
      <button onclick="gotoGallery()" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">←</button>
      <div class="topbar-title" style="flex:1;margin-left:12px">📦 批量导入</div>
      ${bulkItems.length?`<div class="pill" style="cursor:default">${bulkItems.length}张</div>`:""}
    </div>
    <div class="bulk-list" id="bulk-list">${body}</div>
    ${bulkItems.length&&!bulkSaving?`
    <div class="bottom-bar">
      <div class="info"><b>${ready}</b> 张已就绪${noDate?` · <span class="warn">${noDate} 张缺日期</span>`:""}
        <br><span style="font-size:.72rem;opacity:.7">缺日期的照片将被跳过</span>
      </div>
      <button class="btn-save" style="flex:0 0 auto;width:auto;padding:13px 22px" onclick="handleBulkSave()">✨ 确认上传</button>
    </div>
    <label style="position:fixed;bottom:80px;right:20px;width:44px;height:44px;background:#fff;border:2px solid var(--blush);border-radius:50%;cursor:pointer;box-shadow:0 3px 12px rgba(255,123,172,.25);font-size:1.1rem;display:flex;align-items:center;justify-content:center">
      <input type="file" accept="image/*" multiple id="bulk-add" style="display:none">＋
    </label>`:""}
  </div>`;
}

function bindBulk() {
  const bi = document.getElementById("bulk-input");
  if (bi) bi.onchange = handleBulkFiles;
  const ba = document.getElementById("bulk-add");
  if (ba) ba.onchange = handleBulkFiles;
  // date/note changes
  document.querySelectorAll(".bi-date").forEach(inp=>{
    inp.onchange=e=>{
      const id=e.target.dataset.bid;
      state.bulkItems=state.bulkItems.map(x=>x.tempId===id?{...x,date:e.target.value}:x);
      e.target.classList.toggle("missing",!e.target.value);
    };
  });
  document.querySelectorAll(".bi-note").forEach(inp=>{
    inp.oninput=e=>{
      const id=e.target.dataset.bid;
      state.bulkItems=state.bulkItems.map(x=>x.tempId===id?{...x,note:e.target.value}:x);
    };
  });
  // remove
  document.querySelectorAll("[data-brm]").forEach(b=>{
    b.onclick=()=>{
      state.bulkItems=state.bulkItems.filter(x=>x.tempId!==b.dataset.brm);
      render();
    };
  });
  // fill date input
  const fd=document.getElementById("fill-date");
  if (fd) fd.onchange=e=>{ state.fillDate=e.target.value; };
}

async function handleBulkFiles(e) {
  const files = Array.from(e.target.files).filter(f=>f.type.startsWith("image/"));
  if (!files.length) return;
  e.target.value="";
  setState({bulkScanning:true});

  const BATCH=8;
  const result=[];
  for (let i=0;i<files.length;i+=BATCH) {
    const chunk=files.slice(i,i+BATCH);
    const processed=await Promise.all(chunk.map(async file=>{
      const [dataUrl,{date,src:dateSrc}]=await Promise.all([toDataUrl(file),smartDate(file)]);
      return {tempId:`tmp_${Math.random().toString(36).slice(2)}`,file,dataUrl,date:date||"",note:"",dateSrc};
    }));
    result.push(...processed);
    await new Promise(r=>setTimeout(r,0));
  }
  result.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const detected=result.filter(x=>x.date).length;
  state.bulkItems=[...state.bulkItems,...result];
  setState({bulkScanning:false});
  showToast(`📋 扫描 ${result.length} 张，${detected} 张识别到日期`,4000);
}

window.applyFillDate = function() {
  const fd=document.getElementById("fill-date");
  const date=fd?fd.value:state.fillDate;
  if (!date) { showToast("请先选择日期"); return; }
  state.bulkItems=state.bulkItems.map(x=>x.date?x:{...x,date});
  setState({fillDate:date});
  showToast(`已填入 ${state.bulkItems.filter(x=>x.date===date&&!x.dateSrc?.includes("auto")).length||"所有未识别"} 张`);
};

window.handleBulkSave = async function() {
  const toSave=state.bulkItems.filter(x=>x.date);
  const skip=state.bulkItems.filter(x=>!x.date).length;
  if (!toSave.length) { showToast("没有可上传的照片，请先填写日期"); return; }
  if (skip>0&&!confirm(`有 ${skip} 张没有填写日期，将跳过。\n继续上传 ${toSave.length} 张吗？`)) return;

  setState({bulkSaving:true,bulkProgress:0});
  const newPhotos=[];
  try {
    for (let i=0;i<toSave.length;i++) {
      const item=toSave[i];
      const photo=await uploadPhoto(item.file,item.date,item.note);
      newPhotos.push(photo);
      setState({bulkProgress:Math.round((i+1)/toSave.length*100)});
    }
    const all=[...state.photos,...newPhotos].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    saveLocalIndex(all);
    const years=[...new Set(newPhotos.map(p=>p.date.split("-")[0]))].sort((a,b)=>b-a);
    showToast(`🎉 成功上传 ${newPhotos.length} 张！`,4000);
    setState({photos:all,activeYear:years[0],bulkItems:[],bulkSaving:false,bulkProgress:0,view:"gallery"});
  } catch(err) {
    showToast("❌ " + err.message);
    setState({bulkSaving:false});
  }
};

window.gotoGallery = function() {
  if (state.bulkSaving) return;
  setState({view:"gallery"});
};

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════
if (isConfigured()) {
  loadPhotos();
} else {
  render();
}
</script>
</body>
</html>
